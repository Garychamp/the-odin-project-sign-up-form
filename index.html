<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Sign Up Form</title>
</head>
<body>


  <form action="get">
    <div class="logo">
      <img src="media/images/halie-west-25xggax4bSA-unsplash.jpg" alt="background-image" class="background-image ">
    </div>


    <div class="form-container">
        <div class="top-container">
          <p1>This is not a real online service! You know you need something
                like this in your life to help you realize your deepest dreams.
                Sign up now to get started.
                You know you want to.</p1>
        </div>

      <div class="middle-container">
        <p1> Let's do this!</p1>

        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="first-name" placeholder="Thor" required>

        <label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="last-name" placeholder="Odinson" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="thor@asgard.com" required>

        <label for="phone-number">Phone Number</label>
        <input type="number" id="phone-number" name="phone-number" placeholder="123-456-7890" required>
        
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="********" required>

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm-password" placeholder="********"  required>
      </div>

      <div class="bottom-container">
        <button type="submit">Create Account</button>

        <p1>Already have an account? <a href="#">Log in here</a>.</p1>
    </div>

  </form>
  
</body>
</html>
